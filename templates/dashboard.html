<!DOCTYPE html>
<html>
<head>
    <title>Crypto Alerts Dashboard</title>
    <meta http-equiv="refresh" content="5">
    <style>
        body { font-family: Arial; padding: 30px; background: #111; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #333; }
        .momentum { color: #00ff99; }
        .volume { color: #66aaff; }
    </style>
</head>
<body>
    <h1>Crypto Alerts</h1>

    <table>
        <tr>
            <th>Coin</th>
            <th>Prijs</th>
            <th>Alert</th>
            <th>Tijd</th>
        </tr>

        {% for alert in alerts %}
        <tr>
            <td>{{ alert[0] }}</td>
            <td>{{ alert[1] }}</td>
            <td class="{{ alert[2] }}">{{ alert[2] }}</td>
            <td>{{ alert[3] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
